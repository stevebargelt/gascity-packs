# Gasworks Pack — Product development workflow agents
#
# Adds strategic planning layer before execution:
# - Product Manager: Writes PRDs, coordinates research
# - Product Researcher: Parallel research tasks (pool)
# - Architect: System design, architecture docs (singleton)
# - Project Orchestrator: Phased project planning, bead backlog creation (singleton)
#
# Referenced by rigs[].includes in city.toml

[pack]
name = "gasworks"
schema = 1
version = "0.3.0"

# ── PRODUCT MANAGER — PRD creation and research coordination ──────
[[agent]]
name = "pm"
scope = "rig"
work_dir = ".gc/agents/{{.Rig}}/pm"
prompt_template = "prompts/pm.md.tmpl"
nudge = "Check your hook for PRD assignments."
overlay_dir = "overlays/default"
idle_timeout = "4h"

# ── PRODUCT RESEARCHER — Parallel research pool ───────────────────
[[agent]]
name = "product-researcher"
scope = "rig"
work_dir = ".gc/agents/{{.Rig}}/researchers/{{.AgentBase}}"
prompt_template = "prompts/product-researcher.md.tmpl"
nudge = "Check for research assignments."
overlay_dir = "overlays/default"
idle_timeout = "2h"
[agent.pool]
min = 0
max = 4
namepool = "namepools/scientists.txt"

# ── ARCHITECT — System design and architecture documentation ──────
[[agent]]
name = "architect"
scope = "rig"
work_dir = ".gc/agents/{{.Rig}}/architect"
prompt_template = "prompts/architect.md.tmpl"
nudge = "Check for architecture assignments."
overlay_dir = "overlays/default"
idle_timeout = "4h"

# ── PROJECT ORCHESTRATOR — Phased planning and bead backlog creation ──
[[agent]]
name = "orchestrator"
scope = "rig"
work_dir = ".gc/agents/{{.Rig}}/orchestrator"
prompt_template = "prompts/orchestrator.md.tmpl"
nudge = "Check for project planning assignments."
overlay_dir = "overlays/default"
idle_timeout = "4h"
