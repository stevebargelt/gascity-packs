# Gasworks Pack — Product development workflow agents
#
# Adds strategic planning layer before execution:
# - Product Manager: Writes PRDs, coordinates research
# - Product Researcher: Parallel research tasks (pool)
# - Architect: System design, architecture docs (singleton)
# - Project Orchestrator: Phased project planning, bead backlog creation (singleton)
#
# Referenced by rigs[].includes in city.toml

[pack]
name = "gasworks"
schema = 1
version = "0.5.0"

# ── PRODUCT MANAGER — PRD creation and research coordination ──────
[[agent]]
name = "pm"
scope = "rig"
work_dir = ".gc/agents/{{.Rig}}/pm"
prompt_template = "prompts/pm.md.tmpl"
nudge = "Check your hook for PRD assignments."
overlay_dir = "overlays/default"
idle_timeout = "4h"
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}/../gastown",
    "{{.ConfigDir}}/../gastown/scripts/tmux-keybindings.sh {{.ConfigDir}}/../gastown",
]
# gc sling encodes the target agent name with -- instead of / (e.g. gasworks--pm).
# This sling_query corrects it before passing to bd.
sling_query = "bd update {} --assignee=$(echo $GC_SLING_TARGET | sed 's|--|/|')"

# ── PRODUCT RESEARCHER — Parallel research pool ───────────────────
[[agent]]
name = "product-researcher"
scope = "rig"
work_dir = ".gc/agents/{{.Rig}}/researchers/{{.AgentBase}}"
prompt_template = "prompts/product-researcher.md.tmpl"
nudge = "Check for research assignments."
overlay_dir = "overlays/default"
idle_timeout = "2h"
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}/../gastown",
    "{{.ConfigDir}}/../gastown/scripts/tmux-keybindings.sh {{.ConfigDir}}/../gastown",
]
[agent.pool]
min = 0
max = 4
namepool = "namepools/scientists.txt"
work_query = "bd ready --label=pool:{{.Rig}}/product-researcher --json --limit=1 2>/dev/null"

# ── ARCHITECT — System design and architecture documentation ──────
[[agent]]
name = "architect"
scope = "rig"
work_dir = ".gc/agents/{{.Rig}}/architect"
prompt_template = "prompts/architect.md.tmpl"
nudge = "Check for architecture assignments."
overlay_dir = "overlays/default"
idle_timeout = "4h"
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}/../gastown",
    "{{.ConfigDir}}/../gastown/scripts/tmux-keybindings.sh {{.ConfigDir}}/../gastown",
]
# gc sling encodes the target agent name with -- instead of / (e.g. gasworks--architect).
# This sling_query corrects it before passing to bd.
sling_query = "bd update {} --assignee=$(echo $GC_SLING_TARGET | sed 's|--|/|')"

# ── UX DESIGNER — Elicitation, user flows, wireframes, design system ──
[[agent]]
name = "ux-designer"
scope = "rig"
work_dir = ".gc/agents/{{.Rig}}/ux-designer"
prompt_template = "prompts/ux-designer.md.tmpl"
nudge = "Check for UX design assignments."
overlay_dir = "overlays/default"
idle_timeout = "4h"
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}/../gastown",
    "{{.ConfigDir}}/../gastown/scripts/tmux-keybindings.sh {{.ConfigDir}}/../gastown",
]
sling_query = "bd update {} --assignee=$(echo $GC_SLING_TARGET | sed 's|--|/|')"

# ── STAFF ENGINEER — Persistent rig-level technical partner. One per rig. ──
[[agent]]
name = "staff-engineer"
scope = "rig"
work_dir = ".gc/worktrees/{{.Rig}}/staff-engineer"
prompt_template = "prompts/staff-engineer.md.tmpl"
nudge = "Check mail and orient yourself to the current rig state."
overlay_dir = "overlays/default"
min_active_sessions = 1
max_active_sessions = 1
pre_start = ["{{.ConfigDir}}/../gastown/scripts/worktree-setup.sh {{.RigRoot}} {{.WorkDir}} staff-engineer --sync"]
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}/../gastown",
    "{{.ConfigDir}}/../gastown/scripts/tmux-keybindings.sh {{.ConfigDir}}/../gastown",
]
[agent.option_defaults]
model = "claude-opus-4-6"

# ── PROJECT ORCHESTRATOR — Phased planning and bead backlog creation ──
[[agent]]
name = "orchestrator"
scope = "rig"
work_dir = ".gc/agents/{{.Rig}}/orchestrator"
prompt_template = "prompts/orchestrator.md.tmpl"
nudge = "Check for project planning assignments."
overlay_dir = "overlays/default"
idle_timeout = "4h"
session_live = [
    "{{.ConfigDir}}/scripts/tmux-theme.sh {{.Session}} {{.Agent}} {{.ConfigDir}}/../gastown",
    "{{.ConfigDir}}/../gastown/scripts/tmux-keybindings.sh {{.ConfigDir}}/../gastown",
]
# gc sling encodes the target agent name with -- instead of / (e.g. gasworks--orchestrator).
# This sling_query corrects it before passing to bd.
sling_query = "bd update {} --assignee=$(echo $GC_SLING_TARGET | sed 's|--|/|')"
